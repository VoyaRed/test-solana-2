<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpsideDownCake | SOL-PERP Terminal</title>
    <style>
        :root {
            --bg-base: #0B0E11;
            --bg-panel: #181A20;
            --border-color: #2B3139;
            --text-main: #EAECEF;
            --text-muted: #848E9C;
            --up-color: #0ECB81;
            --down-color: #F6465D;
            --accent: #FCD535; /* Binance/Jupiter yellowish accent */
            --font-main: 'Inter', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Courier New', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 24px;
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
        }

        .header-brand { font-weight: 700; font-size: 1.2rem; color: var(--accent); }
        
        .header-ticker {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .ticker-name { font-size: 1.5rem; font-weight: 800; }
        .ticker-price { 
            font-family: var(--font-mono); 
            font-size: 2rem; 
            font-weight: 700;
            color: var(--up-color); /* Defaults to green, updated via JS */
            text-shadow: 0 0 10px rgba(14, 203, 129, 0.2);
        }

        .mode-toggle {
            display: flex;
            background: var(--bg-base);
            border-radius: 4px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }
        .mode-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .mode-btn.active-paper { background: var(--text-muted); color: #fff; }
        .mode-btn.active-live { background: var(--down-color); color: #fff; box-shadow: 0 0 10px rgba(246, 70, 93, 0.4); }

        /* --- MAIN GRID --- */
        .container {
            display: grid;
            grid-template-columns: 300px 1fr 350px;
            gap: 1px;
            background-color: var(--border-color); /* creates 1px borders */
            flex-grow: 1;
            overflow: hidden;
        }

        .panel {
            background-color: var(--bg-panel);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .panel-header {
            padding: 12px 16px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .panel-content { padding: 16px; }

        /* --- SETTINGS PANEL (LEFT) --- */
        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .input-row {
            display: flex;
            gap: 8px;
        }
        .input-row input {
            flex-grow: 1;
            background: var(--bg-base);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: var(--font-mono);
        }
        .input-row button {
            background: var(--border-color);
            color: var(--text-main);
            border: none;
            padding: 0 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        .input-row button:hover { background: #3b424a; }

        /* --- MIDDLE PANEL (POSITION & LOGS) --- */
        .middle-layout {
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: var(--bg-base);
        }
        
        .active-position-card {
            background-color: var(--bg-panel);
            margin: 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
        }
        .pos-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .pos-type {
            font-size: 1.2rem;
            font-weight: 800;
        }
        .pos-long { color: var(--up-color); }
        .pos-short { color: var(--down-color); }
        
        .force-close-btn {
            background-color: var(--down-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        .pos-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        .data-point {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .data-label { font-size: 0.8rem; color: var(--text-muted); }
        .data-value { font-family: var(--font-mono); font-size: 1.1rem; }

        .terminal-container {
            flex-grow: 1;
            background-color: var(--bg-panel);
            margin: 0 16px 16px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .terminal-logs {
            padding: 12px;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            line-height: 1.5;
            color: #A0AEC0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .log-entry.win { color: var(--up-color); }
        .log-entry.loss { color: var(--down-color); }
        .log-entry.veto { color: var(--accent); }

        /* --- METRICS PANEL (RIGHT) --- */
        .metric-block {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .metric-block:last-child { border-bottom: none; }
        .metric-title { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
        .metric-big { font-family: var(--font-mono); font-size: 1.6rem; font-weight: 700; }
        .pnl-positive { color: var(--up-color); }
        .pnl-negative { color: var(--down-color); }

    </style>
</head>
<body>

    <header>
        <div class="header-brand">NEPTUNE ALPHA</div>
        <div class="header-ticker">
            <div class="ticker-name">SOL-PERP</div>
            <div class="ticker-price" id="livePrice">---</div>
        </div>
        <div class="mode-toggle">
            <button class="mode-btn" id="btnPaper" onclick="setMode('PAPER')">PAPER</button>
            <button class="mode-btn" id="btnLive" onclick="setMode('LIVE')">LIVE WEB3</button>
        </div>
    </header>

    <div class="container">
        <!-- LEFT: SETTINGS -->
        <div class="panel">
            <div class="panel-header">Execution Parameters</div>
            <div class="panel-content">
                <div class="input-group">
                    <label>Margin / Collateral (SOL) <span id="lblMargin" style="color:var(--text-main); float:right;"></span></label>
                    <div class="input-row">
                        <input type="number" id="inpMargin" step="0.1" placeholder="e.g. 1.0">
                        <button onclick="updateConfig('margin', 'inpMargin')">SET</button>
                    </div>
                </div>
                
                <div class="input-group">
                    <label>Leverage Multiplier <span id="lblLeverage" style="color:var(--text-main); float:right;"></span></label>
                    <div class="input-row">
                        <input type="number" id="inpLeverage" step="1" placeholder="e.g. 10">
                        <button onclick="updateConfig('leverage', 'inpLeverage')">SET</button>
                    </div>
                </div>

                <div class="input-group">
                    <label>AI Veto Threshold <span id="lblVeto" style="color:var(--text-main); float:right;"></span></label>
                    <div class="input-row">
                        <input type="number" id="inpVeto" step="0.05" placeholder="e.g. 0.50">
                        <button onclick="updateConfig('threshold', 'inpVeto')">SET</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- MIDDLE: POSITION & LOGS -->
        <div class="middle-layout">
            <div class="active-position-card" id="positionCard">
                <!-- Injected via JS -->
                <div style="text-align: center; color: var(--text-muted); font-style: italic; padding: 20px;">
                    Awaiting exchange data...
                </div>
            </div>

            <div class="terminal-container">
                <div class="panel-header">System Event Terminal</div>
                <div class="terminal-logs" id="logTerminal"></div>
            </div>
        </div>

        <!-- RIGHT: METRICS -->
        <div class="panel">
            <div class="panel-header">Account & Performance</div>
            
            <div class="metric-block">
                <div class="metric-title">Wallet Balance (USDC)</div>
                <div class="metric-big" id="valBalance">---</div>
            </div>
            
            <div class="metric-block">
                <div class="metric-title">Net PNL (Realized)</div>
                <div class="metric-big" id="valPnl">---</div>
            </div>

            <div class="metric-block">
                <div class="metric-title">Win Rate</div>
                <div class="metric-big" id="valWinRate">---</div>
            </div>

            <div class="metric-block" style="display: flex; justify-content: space-between;">
                <div>
                    <div class="metric-title">Wins</div>
                    <div class="metric-big pnl-positive" id="valWins" style="font-size:1.2rem;">-</div>
                </div>
                <div>
                    <div class="metric-title">Losses</div>
                    <div class="metric-big pnl-negative" id="valLosses" style="font-size:1.2rem;">-</div>
                </div>
                <div>
                    <div class="metric-title">Total</div>
                    <div class="metric-big" id="valTotal" style="font-size:1.2rem;">-</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let lastPrice = 0;

        async function fetchDashboardData() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                renderDashboard(data);
            } catch (err) {
                console.error("Dashboard Sync Error:", err);
            }
        }

        function renderDashboard(data) {
            // 1. Live Price
            const currentPrice = data.current_sol_price || 0.0;
            const priceEl = document.getElementById('livePrice');
            priceEl.innerText = `$${currentPrice.toFixed(4)}`;
            
            if (currentPrice > lastPrice) {
                priceEl.style.color = 'var(--up-color)';
                priceEl.style.textShadow = '0 0 10px rgba(14, 203, 129, 0.4)';
            } else if (currentPrice < lastPrice) {
                priceEl.style.color = 'var(--down-color)';
                priceEl.style.textShadow = '0 0 10px rgba(246, 70, 93, 0.4)';
            }
            lastPrice = currentPrice;

            // 2. Mode Toggle State
            const btnPaper = document.getElementById('btnPaper');
            const btnLive = document.getElementById('btnLive');
            if (data.trading_mode === 'LIVE') {
                btnLive.className = 'mode-btn active-live';
                btnPaper.className = 'mode-btn';
            } else {
                btnPaper.className = 'mode-btn active-paper';
                btnLive.className = 'mode-btn';
            }

            // 3. Settings Labels
            document.getElementById('lblMargin').innerText = `(${data.config_metrics.active_margin_setting})`;
            document.getElementById('lblLeverage').innerText = `(${data.config_metrics.active_leverage_setting})`;
            document.getElementById('lblVeto').innerText = `(${data.config_metrics.current_veto_threshold})`;

            // 4. Metrics
            const pnl = data.live_metrics.net_pnl_usdc;
            const pnlEl = document.getElementById('valPnl');
            pnlEl.innerText = `${pnl >= 0 ? '+' : ''}${pnl.toFixed(4)}`;
            pnlEl.className = pnl >= 0 ? 'metric-big pnl-positive' : 'metric-big pnl-negative';

            document.getElementById('valBalance').innerText = `$${data.live_metrics.wallet_balance_usdc.toFixed(2)}`;
            document.getElementById('valWinRate').innerText = data.live_metrics.win_rate;
            document.getElementById('valWins').innerText = data.live_metrics.wins;
            document.getElementById('valLosses').innerText = data.live_metrics.losses;
            document.getElementById('valTotal').innerText = data.live_metrics.total_trades;

            // 5. Active Position Card
            const posCard = document.getElementById('positionCard');
            if (data.current_position) {
                const pos = data.current_position;
                const isLong = pos.type.includes('LONG');
                const typeClass = isLong ? 'pos-long' : 'pos-short';
                const pnlEst = isLong 
                    ? (pos.current_price - pos.entry_price) * parseFloat(pos.bet_size)
                    : (pos.entry_price - pos.current_price) * parseFloat(pos.bet_size);

                posCard.innerHTML = `
                    <div class="pos-header">
                        <div class="pos-type ${typeClass}">${pos.type} &nbsp; <span style="font-size: 0.9rem; color: var(--text-muted); font-weight: normal;">${pos.bet_size}</span></div>
                        <button class="force-close-btn" onclick="forceClose()">MARKET CLOSE</button>
                    </div>
                    <div class="pos-grid">
                        <div class="data-point">
                            <span class="data-label">Entry Price</span>
                            <span class="data-value">$${pos.entry_price.toFixed(4)}</span>
                        </div>
                        <div class="data-point">
                            <span class="data-label">Mark Price</span>
                            <span class="data-value">$${pos.current_price.toFixed(4)}</span>
                        </div>
                        <div class="data-point">
                            <span class="data-label">Unrealized PNL</span>
                            <span class="data-value ${pnlEst >= 0 ? 'pnl-positive' : 'pnl-negative'}">
                                ${pnlEst >= 0 ? '+' : ''}${pnlEst.toFixed(4)} USDC
                            </span>
                        </div>
                        <div class="data-point">
                            <span class="data-label">Stop Loss</span>
                            <span class="data-value" style="color: var(--down-color)">$${pos.stop_loss.toFixed(4)}</span>
                        </div>
                        <div class="data-point">
                            <span class="data-label">Take Profit</span>
                            <span class="data-value" style="color: var(--up-color)">$${pos.take_profit.toFixed(4)}</span>
                        </div>
                        <div class="data-point">
                            <span class="data-label">Margin / Leverage</span>
                            <span class="data-value">${pos.margin_locked} @ ${pos.leverage_multiplier}</span>
                        </div>
                    </div>
                `;
                posCard.style.borderColor = isLong ? 'var(--up-color)' : 'var(--down-color)';
            } else {
                posCard.innerHTML = `
                    <div style="text-align: center; color: var(--text-muted); padding: 30px 0;">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom: 10px; opacity: 0.5;">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        <div>No Active Positions</div>
                        <div style="font-size: 0.8rem; margin-top: 5px;">Scanning for EMA setups...</div>
                    </div>
                `;
                posCard.style.borderColor = 'var(--border-color)';
            }

            // 6. Logs
            const logTerm = document.getElementById('logTerminal');
            logTerm.innerHTML = '';
            data.recent_activity_logs.forEach(log => {
                const div = document.createElement('div');
                div.className = 'log-entry';
                if (log.includes('WIN') || log.includes('LONG Executed') || log.includes('ALLOWED')) div.classList.add('win');
                if (log.includes('LOSS') || log.includes('SHORT Executed') || log.includes('Force-Closed')) div.classList.add('loss');
                if (log.includes('VETO')) div.classList.add('veto');
                div.innerText = `> ${log}`;
                logTerm.appendChild(div);
            });
        }

        // --- API INTERACTIONS ---

        async function setMode(mode) {
            if (mode === 'LIVE' && !confirm("WARNING: You are about to enable LIVE WEB3 EXECUTION. Real funds will be used. Continue?")) return;
            await fetch('/api/settings/mode', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mode: mode })
            });
            fetchDashboardData();
        }

        async function updateConfig(endpoint, inputId) {
            const val = document.getElementById(inputId).value;
            if (!val) return;
            await fetch(`/api/config/${endpoint}?val=${val}`, { method: 'POST' });
            document.getElementById(inputId).value = '';
            fetchDashboardData();
        }

        async function forceClose() {
            if(!confirm("Are you sure you want to market close the active position?")) return;
            await fetch('/api/override/close', { method: 'POST' });
            fetchDashboardData();
        }

        // Loop
        setInterval(fetchDashboardData, 2000);
        fetchDashboardData(); // Initial load
    </script>
</body>
</html>
